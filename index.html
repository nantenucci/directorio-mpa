<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directorio MPA Santa Fe 2026</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1B3A6B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MPA 2026" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:    #1B3A6B;
      --azul2:   #2E5BA8;
      --azul-acc:#7BA7E0;
      --azul-l:  #EBF1FB;
      --verde:   #1D6A2E;
      --verde-l: #EAF5EC;
      --amarillo:#B8860B;
      --amar-l:  #FEF9E7;
      --negro:   #111110;
      --gris:    #F4F4F2;
      --gris2:   #E8E8E4;
      --gris3:   #9A9A96;
      --blanco:  #FAFAF8;
      --borde:   #D8D8D4;
    }

    html, body { height: 100%; }

    body {
      font-family: 'IBM Plex Sans', Arial, system-ui, sans-serif;
      background: var(--gris);
      color: var(--negro);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--azul);
      border-bottom: 2px solid var(--azul2);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .topbar-brand span { color: var(--azul-acc); }
    .topbar-sub {
      font-size: 10px;
      color: var(--azul-acc);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── SEARCH BAR ── */
    .search-section {
      background: #fff;
      border-bottom: 1px solid var(--borde);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 520px;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gris3);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid var(--borde);
      border-radius: 4px;
      background: var(--gris);
      color: var(--negro);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-input:focus {
      border-color: var(--azul2);
      background: #fff;
    }
    .search-input::placeholder { color: var(--gris3); }
    .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gris3);
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      display: none;
    }
    .clear-btn:hover { color: var(--negro); }
    .count-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gris3);
      white-space: nowrap;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 16px 24px 32px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── GRID DE CARDS ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 8px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--gris2);
      border-radius: 4px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover {
      border-color: var(--azul2);
      background: var(--azul-l);
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--azul);
      color: var(--azul-l);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .info {
      flex: 1;
      min-width: 0;
    }
    .name {
      font-size: 13px;
      font-weight: 600;
      color: var(--negro);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .email {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--gris3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-tel {
      color: var(--azul);
      border-color: var(--azul2);
      background: var(--azul-l);
    }
    .btn-tel:hover { background: #D6E8FF; }
    .btn-wa {
      color: var(--verde);
      border-color: var(--verde);
      background: var(--verde-l);
    }
    .btn-wa:hover { background: #C3E6CB; }
    .btn-mail {
      color: var(--amarillo);
      border-color: var(--amarillo);
      background: var(--amar-l);
    }
    .btn-mail:hover { background: #FDE9A0; }

    /* ── SIN RESULTADOS ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--gris3);
      font-size: 13px;
      padding: 48px 0;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      font-size: 10px;
      color: var(--gris3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 0 20px;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      main { padding: 12px 12px 24px; }
      .search-section { padding: 10px 16px; }
      .grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>

    <div class="search-wrap">

        id="q"

      />
      <button class="clear-btn" id="clear" aria-label="Limpiar búsqueda">×</button>
    </div>
    <div class="count-badge" id="count"></div>
  </div>

  <main>

    function initials(name) {
      const parts = name.trim().split(/\s+/);
      return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
    }

    function normalize(s) {
      return s.toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    }

    function render(q) {
      const term = normalize(q.trim());
      const filtered = DATA.filter(([name]) => normalize(name).includes(term));

      const countEl = document.getElementById('count');
      countEl.textContent = filtered.length + (filtered.length === 1 ? ' contacto' : ' contactos');

      const grid = document.getElementById('grid');
      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">Sin resultados para "' + q + '"</div>';
        return;
      }

      grid.innerHTML = filtered.map(([name, tel, email]) => {
        const ini = initials(name);
        const telBtn = tel
          ? `<a class="btn btn-tel" href="tel:+54${tel}" title="${tel}">${tel}</a>`
          : '';
        const waBtn = tel
          ? `<a class="btn btn-wa" href="https://wa.me/54${tel}" target="_blank" rel="noopener">WA</a>`
          : '';
        const mailBtn = `<a class="btn btn-mail" href="mailto:${email}">Mail</a>`;
        return `
          <div class="card">
            <div class="avatar" aria-hidden="true">${ini}</div>
            <div class="info">
              <div class="name">${name}</div>
              <div class="email">${email}</div>
            </div>
            <div class="actions">${telBtn}${waBtn}${mailBtn}</div>
          </div>`;
      }).join('');
    }

    const input = document.getElementById('q');
    const clearBtn = document.getElementById('clear');

    input.addEventListener('input', () => {
      clearBtn.style.display = input.value ? 'block' : 'none';
      render(input.value);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.style.display = 'none';
      input.focus();
      render('');
    });

    render('');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
